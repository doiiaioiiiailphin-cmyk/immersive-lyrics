<!doctype html>
<html lang="zh-CN">
<head>
<link rel="stylesheet" href="css/styles.css">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Immersive Lyrics</title>
</head>
<body>
<header class="window-titlebar" data-tauri-drag-region>
<div class="window-brand" data-tauri-drag-region>
<span class="window-brand-mark" aria-hidden="true"><img src="assets/app-icon.svg" alt=""></span>
<span class="window-brand-copy"><strong id="window-track">沉浸歌词</strong><small id="window-subtitle">准备播放</small></span>
</div>
<div class="window-drag" data-tauri-drag-region></div>
<div class="window-controls" aria-label="窗口控制">
<button type="button" class="window-control" data-window-action="minimize" aria-label="最小化"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 14.2c3.2 1.8 6.8 1.8 10 0"/></svg></button>
<button type="button" class="window-control maximize" data-window-action="maximize" aria-label="最大化" title="最大化"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8.4 7.2h7.2c.66 0 1.2.54 1.2 1.2v7.2c0 .66-.54 1.2-1.2 1.2H8.4c-.66 0-1.2-.54-1.2-1.2V8.4c0-.66.54-1.2 1.2-1.2Z"/><path d="M9.8 10.2c1.4-.9 3-.9 4.4 0"/></svg></button>
<button type="button" class="window-control restore" data-window-action="restore" aria-label="还原窗口" title="还原窗口" hidden><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9.4 8.2h5.9c.65 0 1.18.53 1.18 1.18v5.9"/><path d="M7.5 10.55h6.1c.66 0 1.2.54 1.2 1.2v4.75c0 .66-.54 1.2-1.2 1.2H7.5c-.66 0-1.2-.54-1.2-1.2v-4.75c0-.66.54-1.2 1.2-1.2Z"/></svg></button>
<button type="button" class="window-control close" data-window-action="close" aria-label="关闭"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8.1 8.1c2.7 2.1 5.1 4.5 7.8 7.8"/><path d="M15.9 8.1c-2.7 2.1-5.1 4.5-7.8 7.8"/></svg></button>
</div>
</header>
<video id="bilibili-video-bg" class="bilibili-video-bg" muted playsinline preload="metadata" aria-hidden="true"></video><canvas id="silk-background" aria-hidden="true"></canvas><div class="background"></div><div class="grain"></div>
<main class="app">
<section class="player" id="player">
<img class="cover" src="assets/app-icon.svg" alt="">
<div class="meta">
<div class="title">天使にふれたよ!</div>
<div class="artist">放課後ティータイム</div>
<div class="wave" id="wave"></div>
<div class="timeline"><span id="now">0:00</span><div class="track" id="track"><div class="buffer" id="buffer"></div><div class="fill" id="fill"></div></div><span id="total">--:--</span></div>
<div class="controls">
<button class="icon tiny mode-button" id="play-mode" aria-label="顺序播放" title="顺序播放"><svg class="stroke-icon sequence-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 12h17m-3-3 3 3-3 3"/><circle cx="5" cy="12" r="1.45"/><circle cx="10.5" cy="12" r="1.45"/><circle cx="16" cy="12" r="1.45"/></svg></button>
<button class="icon tiny sound-button" id="mute" aria-label="静音" title="静音"><svg class="sound-icon" viewBox="0 0 24 24" aria-hidden="true"><path class="speaker-body" d="M4 9h3.3L12 5.4v13.2L7.3 15H4V9Z"/><g class="sound-waves"><path d="M14.2 9.1a4 4 0 0 1 0 5.8"/><path d="M16.5 6.7a7.3 7.3 0 0 1 0 10.6"/></g></svg></button>
<button class="icon side skip-prev" id="prev" aria-label="previous"><svg viewBox="0 0 24 24"><path d="M6 5h2v14H6V5Zm3 7 10-7v14L9 12Z"/></svg></button>
<button class="icon main" id="play" aria-label="播放"><svg class="play-morph" viewBox="0 0 24 24" aria-hidden="true"><path id="play-shape-left" d="M8 5 L12 8 L12 16 L8 19 Z"/><path id="play-shape-right" d="M12 8 L18 12 L18 12 L12 16 Z"/></svg></button>
<button class="icon side skip-next" id="next" aria-label="next"><svg viewBox="0 0 24 24"><path d="M16 5h2v14h-2V5ZM5 5l10 7-10 7V5Z"/></svg></button>
<button class="icon tiny settings-button" id="settings" aria-label="均衡器设置" aria-expanded="false"><svg class="gear-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M13.3 3.25h-2.6l-.45 2.18a6.7 6.7 0 0 0-1.45.6L6.93 4.8 5.1 6.63l1.23 1.87c-.25.46-.45.94-.6 1.45l-2.18.45V13l2.18.45c.15.51.35.99.6 1.45L5.1 16.77l1.83 1.83 1.87-1.23c.46.25.94.45 1.45.6l.45 2.18h2.6l.45-2.18c.51-.15.99-.35 1.45-.6l1.87 1.23 1.83-1.83-1.23-1.87c.25-.46.45-.94.6-1.45l2.18-.45v-2.6l-2.18-.45a6.7 6.7 0 0 0-.6-1.45l1.23-1.87-1.83-1.83-1.87 1.23a6.7 6.7 0 0 0-1.45-.6l-.45-2.18ZM12 15.35a3.35 3.35 0 1 1 0-6.7 3.35 3.35 0 0 1 0 6.7Z"/></svg></button>
<button class="icon tiny" id="queue" aria-label="queue"><svg viewBox="0 0 24 24"><path d="M4 6h16v2H4V6Zm0 5h16v2H4v-2Zm0 5h10v2H4v-2Zm14-1 4 3-4 3v-6Z"/></svg></button>
</div>
</div>
</section>
<section class="lyrics"><div class="lyric-window"><div class="lyric-list" id="list"></div></div></section>
</main>
<div class="eq-overlay" id="eq-overlay" aria-hidden="true">
<div class="eq-panel" id="eq-panel" role="dialog" aria-modal="true" aria-label="均衡器设置">
<div class="eq-head"><span>均衡器</span><button type="button" id="eq-reset">重置</button></div>
<div class="eq-presets" aria-label="均衡器预设">
<button type="button" data-eq-preset="flat">原声</button>
<button type="button" data-eq-preset="warm">暖声</button>
<button type="button" data-eq-preset="vocal">人声</button>
<button type="button" data-eq-preset="bass">低频</button>
<button type="button" data-eq-preset="spark">通透</button>
</div>
<div class="eq-scale"><span>-12</span><i></i><span>+12</span></div>
<label class="eq-band"><span>超低</span><input type="range" min="-12" max="12" step="1" value="0" data-eq="sub"><output>0</output></label>
<label class="eq-band"><span>低频</span><input type="range" min="-12" max="12" step="1" value="0" data-eq="bass"><output>0</output></label>
<label class="eq-band"><span>中频</span><input type="range" min="-12" max="12" step="1" value="0" data-eq="mid"><output>0</output></label>
<label class="eq-band"><span>人声</span><input type="range" min="-12" max="12" step="1" value="0" data-eq="presence"><output>0</output></label>
<label class="eq-band"><span>空气</span><input type="range" min="-12" max="12" step="1" value="0" data-eq="air"><output>0</output></label>
<div class="settings-cache">
<button type="button" id="cache-current-track"><span class="cache-current-icon" aria-hidden="true"><i></i><i></i><i></i></span><span id="cache-current-label">缓存当前歌曲</span></button>
<small id="cache-current-status">缓存会保存音频、歌词和封面，用于离线播放</small>
</div>
</div>
</div>
<div class="hint" id="hint">点击播放可开启声音</div>
<!-- 轮播式歌曲选择器 -->
<div class="song-picker" id="song-picker"><div class="picker-track" id="picker-track"></div></div>
<audio id="audio" crossorigin="anonymous" preload="metadata"></audio>
<!-- 歌单数据 + 脚本（playlist 必须在 player 之前加载） -->
<script src="js/playlist.js"></script>
<script src="js/silk-background.js"></script>
<script src="js/player.js"></script>
<script src="js/netease.js"></script>
<script src="js/search-panel.js"></script>
<script src="js/window-titlebar.js"></script>
</body>
</html>
